apiVersion: apps/v1
kind: Deployment
metadata: 
  name: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-app
  template:
    metadata:
        labels:
          app: nginx-app
    spec:
        containers:
          - name: nginx-app
            image: nginx:alpine
            ports:
              - containerPort: 80


